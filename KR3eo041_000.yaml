body:
  text: 修真要訣凡欲修養須擇淨室順溫涼之宜明燥濕之異每夜半後生氣時或五更睡覺依法坐立務先瞑目握固調息後乃以次著力行功勤而不怠則自然身輕體健而疾疫可卻性命可延矣雖然此其常法若春得夏疾秋得春疾亦但按法行之豈必待其時然後可哉如此則固而不通滯而不法非善養真也引用諸書聖賢保修通鑑活人心書禮記月令素問內經靈樞經運氣論奧救命索樂道山居錄心印紺珠十四經發揮五運六氣樞要之圖六十年紀運圖四時氣候之圖五天氣圖主氣之圖客氣之圖臟腑配經絡圖一臟一腑相為表裡之官肺手太陰大腸手陽明心手少陰小腸手太陽包絡手厥陰三焦手少陽人身脈運於中周流氣血不已脾足太陰胃足陽明腎足少陰膀胱足太陽肝足厥陰膽足少陽一經一絡各應陰陽之象經絡配四時圖寅手少陽三焦巳手厥陰心包春卯手陽明大腸生夏午手少陰心長辰手太陽小腸未手太陰肺天時十二月人身十二經地支十二位手經絡應天足經絡應地申足少陽膽亥足厥陰肝秋酉足陽明胃殺冬子足少陰腎藏戌足太陽膀胱醜足太陰脾太上養生要訣老子曰人國也神君也血臣也氣民也志人理身明君治國也愛其民所以安其國愛其氣所以全其身民弊則國亡氣衰則身謝是以上士施醫於未病之先不追修於既敗之後也審其機以安社稷節其欲以保性命六害不可不除一曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰屏虛妄六曰除嫉妒少思少念少笑少言少喜少怒少樂少愁少好少惡少事少機多思則神散多念則心勞多笑則臟腑上翻多言則氣海虛脫多喜則膀胱納客風多怒則輳朝勿虛食夏暮勿飽食早起雞鳴後晚起日出前心內澄則真人守位氣內定則外邪去身行一善則魂神喜念一惡則魄神歡魂欲人生魄欲人死寬泰以居恬澹以守神形安靜笑災不生仙錄書名死籍消咎養生之要盡在此矣至於煉丹而補理奔浮多樂則心神邪蕩多愁則頭面焦枯多好則智意潰溢多惡則精爽奔騰多事則筋脈乾急多機則智慮沉迷是皆伐人之生甚於斤斧蝕人之性猛於豺狼無久行無久坐無久立無久臥無久視無久聽不飢強食則脾勞不渴強飲則胃脹冬腦化金液以留形此上真人之妙道非食谷啖血之越分也附活人心法臞仙曰古之神聖之醫而能療人之心預使不致於有疾今之醫者惟知療人之疾而不知療人之心是由捨本逐末不窮根源而攻其流欲求疾愈不亦愚乎雖一時僥倖而安之此則世俗之庸醫不足取也殊不知病由心生業由人作蓋陰有鬼神陽有天理報復之機鮮無不驗故有天刑之疾有自戕之疾其天刑之疾也五體不具生而隱宮者生而暗啞盲聵者因跌撲而手足折者有生人面瘡贅疣疾者凡傳染一切瘵疫之證是也蓋因夙世今生積惡過多天地譴之故致斯疾此亦業原於心也其自戕之疾者調養失宜風寒暑濕之所感酒色財氣之所傷七情六慾生於內陰陽二氣攻於外是謂病生於心害攻於體也今只以人之易知易見者論之且曰人心思火久而體熱人心思水久而體寒悚則發豎驚則汗瀝懼則肉戰愧則面赤悲則淚出慌則心跳氣則麻痹言酸則垂涎言臭則吐唾言喜則笑言哀則哭笑則貌妍哭則貌媸又若日間有所見夜則魂夢有所思疚則訕語夢交合則精泄至若驚悸氣怒而成疾者則發狂裸體逾垣上屋呼神見鬼歌舞笑哭此皆因心而生也太白真人曰欲治其疾先治其心必正其心然後資於道使病者盡去一切疑慮思想一切安念一切不平一切人我悔悟平生所為過惡便當放下身心以我之天而合所事之天久之遂凝於神則自然心君泰寧性地平和知世間萬事皆是空虛終日營為皆是妄想知我身皆是虛幻禍福皆是無有生死皆是一夢慨然領悟頓然解釋心地自然清淨疾病自然安痊能如是藥未到口病已忘矣此真人以道治心療病之大法也蓋真人之教也本於天地立心為生民立命惟心與天一理之所得者獨明而開人心之迷惟其心與地一水之所汲者獨靈而能滌人心之陋故以一杯之水而能療醫所不治之疾罔不瘳者豈由水之靈實資於道之用也苟非其人則以予為妄誕老子曰吾言甚易知甚易行天下莫能知莫能行是以知我者稀則我者貴又曰上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道內觀經曰知道易信道難信道易行道難行道易得道難得道易守道難難守而不失乃可長生治心臞仙曰心者神明之舍中虛不過經寸而神明居焉事物之滑如理亂棼如涉驚浸或怵惕或懲創或喜怒或思慮一日之間一時之頃徑寸之地炎如火矣故神弗留則蠹明弗留則耗休休焉常與道謀而自不覺或曰謹於為善若嗜欲一萌即不善也歸而勿納是與良心競也必有忿悁之心起而與我敵以我矜願之意接彼忿悁之心何為不鬥鬥不止而害生矣凡七情六慾之生於心皆然故曰心靜可以通乎神明事未至而先知是不出戶知天下不窺牖見天道也蓋心如水之不撓久而澄清洞見其底是謂靈明宜乎靜可以固元氣則萬病不生故能長久若一念既萌神馳於外氣散於內血隨氣行榮衛昏亂百病相攻皆因心而生也大概恰恰養天君疾病不作此治心之法也導引法閉目冥心坐冥心盤跗而坐握固靜思神叩齒三十六兩手抱崑崙叉兩手向項後數九息勿令耳聞自此以後出入息皆不可使耳聞左右鳴天鼓二十四度聞移兩手心掩兩耳先以第二指壓中指彈擊腦後左右各二十四次微擺撼天柱搖頭左右顧肩膊隨動二十四先須握固赤龍攪水渾赤龍者舌也以舌攪口齒並左右頰待津液生而咽漱津三十六一云鼓漱神水滿口勻口分三咽所漱津液分作三口作汨汨聲而咽之龍行虎自奔液為龍氣為虎閉氣搓手熱以鼻引清氣閉之少頃搓手令極熱鼻中徐徐乃放氣出背摩後精門精門者腰後外腎也合兩手摩畢收手握固盡此一口氣再閉氣也想火燒臍輪閉口鼻之氣想用心火下燒丹田覺熱極即用後法左右轆轆轉俯首擺撼兩肩三十六想火自丹田透透雙關入腦戶兩腳放舒伸放直兩腳叉手雙虛托叉手相交向上托空三次或九次低頭攀足頻以兩手向前扳腳心十三次乃收足端坐以候逆水上候口中津液生如未生再用急攬取水同前法再漱再吞津如此三度畢神水九次吞謂再漱三十六如前口分三咽乃為九也嚥下汨汨響百脈自調勻河車搬運訖擺肩並身二十四及再轉轆轆二十四次發火遍燒身想丹田火自下而上遍燒身體想時口及鼻皆閉氣少頃邢魔不敢近夢寐不能昏寒暑不能入災病不能迍子後午前作造化合乾坤循環次第轉八卦是良因訣曰其法於甲子日夜半子時起首行時口中不得出氣唯鼻中微放清氣每日子後午前各行一次或晝夜共行三次久而自知蠲除疾疫漸覺身輕若能勤苦不怠則仙道不遠矣叩齒集神三十六兩手抱崑崙雙手擊天鼓二十四上法先須閉目冥心盤坐握固靜思然後叩齒集神次叉兩手向項後數九息勿令耳聞乃移手各掩耳以第二指壓中指擊彈腦後左右各二十四次叩齒集神圖法搖天柱圖法左右手搖天柱各二十四次上法先須握固乃搖頭左右顧肩膊隨動二十四舌攪漱咽圖法左右舌攪上齶三十六漱三十六分作三口如硬物咽之然後方得行火上法以舌攪口齒並左右頰待津液生方漱之至滿口方咽之摩腎堂圖法兩手摩腎堂三十六以數多更妙上法閉氣搓手令熱後摩腎堂如數畢仍收手握固再閉氣想用心火下燒丹田覺熱極即用後法單關轆轤圖左右單關轆轤各三十六上法須俯首擺撼左肩三十六次右肩亦三十六次雙關轆轤圖法雙關轆轤三十六上法兩肩並擺撼至三十六數想火自丹田透雙關入腦戶鼻引清氣後伸兩腳托天按頂圖法兩手相搓當呵五呵後叉手托天按頂各九次上法叉手相交向上托空三次或九次鉤攀圖法以兩手如鉤向前攀雙腳心十二再收足端坐上法以兩手向前攀腳心十二次乃收足端坐候口中津液生再漱再吞一如前數擺肩並身二十四及再轉轆轤二十四次想丹田火自下而上遍燒身體想時口鼻皆須閉氣少頃已上八法乃修真之次第工程也每日子前午後各行一次或晝夜共行三次久則自然身輕體健諸邪無所入矣
