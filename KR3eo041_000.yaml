front:
  text: 序嘗聞修養始於太乙氏而導引則始於陰康氏也太乙時醫藥未立乃調和血氣以保長生而修養之法顯陰康時民患重膇因制舞法以疏氣血而導引之術名故民皆賴以調攝無夭傷之患建法異而致妙同蓋真上古保民之心法也夫何太樸一散歷數千世其法寥寥未聞有得傳者邇惟活人心書所刊導引八圖悉上古遺法而為好修者寶之弘治乙丑秋適見聖賢保修通鑑前序古今學道之失後書道術療病之功深嘉契愛而欲傳之值客歸促留少頃得私謄其概一或受疾輒取試之多有驗焉因嘗嘆是術雖非太乙陰康手書誠保生至法也惜乎簡而未詳微而不著乃用參諸月令搜古醫經反復研究正訛補略並採活人心八法命善圖者繕形摹寫計總三十二圖纂為一帙目之曰保生心鑑俾有生者知所以保養真元不令輕耗保生者知所以煉修形體先須定志小可卻病而大可駐年也所謂煉形蓄氣而養神者或庶幾矣豈小小補益云哉正德丙寅春王正月古南沙鐵峰居士序太清二十四氣水火聚散圖序太清三箔章章林林惟主導引不言藥石豈其以謂山澤之癯形骸土木而云笈有耶非然也藥有真偽性有反誤疾縱去而毒尚留或棄寒暑之變或因飲食之反而生他疾至於殺身者有之是以仙道不取藥石而貴導引導引之上行其無病導引之中行其未病導引之下行其已病何謂也二十四邪方襲膚方滯經絡按摩以行之注閉以攻之咽納以平之不至於侵其榮衛而蝕其臟腑也修身養命者於是乎取之立春正月節運主厥陰初氣月令東風解凍蟄蟲始振魚上冰時配手少陽三焦相火坐功宜每日子丑時疊手按脛轉身拗頸左右聳引各三五度叩齒吐納漱咽治病風氣積滯頸項痛耳後肩臑痛背痛肘臂諸痛雨水正月中運主厥陰初氣月令獺祭魚鴻雁北草木萌動時配手少陽三焦相火坐功每日子丑時疊手按脛拗頸轉身左右偏引各三五度叩齒吐納漱咽治病三焦經絡留滯邪毒嗌乾及腫噦喉痹耳聾汗出目銳眥痛諸疾驚蟄二月節運主厥陰初氣月令桃始華鶬鶊鳴鷹化為鳩時配手陽明大腸燥金坐功每日醜寅時握固轉頸及肘後向頓掣日五六度叩齒六六吐納漱咽三三治病腰膂脾胃蘊積邪毒目黃口乾鼽衄喉痹面腫暴啞頭風牙宣目暗羞明鼻不聞臭疳牙疙瘡春分二月中運主少陰二氣月令玄鳥至雷乃發聲始電時配手陽明大腸燥金行功每日醜寅時伸手回頭左右挽引各六七度叩齒六六吐納漱咽三三治病胸臆肩背經絡虛勞邪毒齒痛頭腫寒粟熱腫耳聾耳鳴耳後肩臑肘臂外背痛氣滿皮膚殼殼然堅而不痛或痰氣皮膚瘙癢清明三月節運主少陰二氣月令桐始華田鼠化為鴽虹始見時配手太陽小腸寒水行功每日醜寅時正坐換手左右如引硬弓各七八度叩齒納清吐濁咽液各三治病腰腎腸胃虛邪積滯耳前熱苦寒耳聾嗌痛頸痛不可回顧肩拔臑折腰軟肘臂諸痛穀雨三月中運主少陰二氣月令萍始生鳴鳩拂其羽戴勝降於桑時配手太陽小腸寒水行功每日醜寅時平坐換手左右舉托移臂左右掩乳各五七度叩齒吐納咽漱治病脾胃結瘕瘀血目黃鼻鼽頰腫頷腫肘臂外後臁腫痛臀外痛掌中熱立夏四月節運主少陰二氣月令螻蟈鳴蚯蚓出王瓜生時配手厥陰心包絡風木坐功每日寅卯時閉息瞑目反換兩手抑挈兩膝各五七度叩齒吐納咽液治病風濕留滯經絡腫痛臂肘攣急腋腫手心熱喜笑不休雜症小滿四月中運主少陽三氣月令苦菜秀靡草死麥秋至時配手厥陰心包絡風木坐功每日寅卯時正坐一手舉托一手拄按左右各三五度叩齒吐納咽液治病肺腑蘊滯邪毒胸脅支滿心中憺憺大動面赤鼻赤目黃煩心心痛掌中熱諸病芒種五月運主少陽三氣月令螳螂生鵙始鳴反舌無聲時配手少陰心君火坐功每日寅卯時正立仰身兩手上托左右力舉各五六度定息叩齒吐納咽液治病腰腎蘊積虛勞嗌乾心痛欲飲目黃脅痛消渴善笑善驚善忘上咳吐下氣泄身熱而股痛心悲頭頂痛面赤夏至五月中運主少陽三氣月令鹿角解蜩始鳴半夏生時配手少陰心君火坐功每日寅卯時跪坐伸手叉指屈腳換踏左右各五七度叩齒納清吐濁咽液治病風濕積滯腕膝痛臑臂痛後廉痛厥掌中熱痛兩腎內痛腰背痛身體重小暑六月節運主少陽三氣月令溫風至蟋蟀居壁鷹乃學習時配手太陰肺濕土行功每日醜寅時兩手踞屈壓一足直伸一足用力掣三五度叩齒吐納咽液治病腿膝腰脾風濕肺脹滿嗌乾喘咳缺盆中痛善嚏臍右小腹脹引腹痛手攣急身體重半身不遂偏風健忘哮喘脫肛腕無力喜怒不常大暑六月中運主太陰四氣月令腐草為螢土潤褥暑大雨時行時配手太陰肺濕土行功每日醜寅時雙拳踞地返首肩引作虎視左右各三五度叩齒吐納咽液治病頭項胸背風毒咳嗽上氣喘渴煩心胸滿臑臂痛中熱臍上或肩背痛風寒汗出中風小便數欠溏泄皮膚痛及麻悲愁欲哭灑淅寒熱立秋七月節運主太陰四氣月令涼風至白露降寒蟬鳴時配足少陽膽相火行功每日醜寅時正坐兩手托縮體閉息聳身上踴凡七八度叩齒吐納咽漱治病補虛益損去腰腎積氣口苦善太息心脅痛不能反側面塵體無澤足外熱頭痛頷痛目銳眥痛缺盆腫痛腋下腫汗出振寒馬刀俠癭結核處暑七月中運主太陰四氣月令鷹乃祭鳥天地始肅禾乃登時配足少陽膽相火行功每日醜寅時正坐轉頭左右舉引就返兩手捶背之上各五七度叩齒吐納咽液治病風濕留滯肩背痛胸痛脊膂痛脅肋髀膝經絡外至脛絕骨外踝前及諸節皆痛少氣咳嗽喘渴上氣胸背脊膂積滯之氣白露八月節運主太陰四氣月令鴻雁來玄鳥歸群鳥養羞時配足陽明胃燥金行功每日醜寅時正坐兩手按膝轉頭左右推引各三五度叩齒吐納咽液治病風氣留滯腰背經絡洒洒振寒善伸數欠或惡人與火聞木聲則驚狂瘧汗出鼽衄口喎唇胗頸腫喉痹不能言顏黑嘔呵欠狂欲上登而歌棄衣而走秋分八月中運主陽明五氣月令雷乃收聲蟄蟲壞戶水始涸時配足陽明胃燥金行功每日醜寅時盤足而坐兩手掩耳左右返側各三五度叩齒吐納咽液治病風濕積滯脅肋腰股腹大水腫膝臏腫痛膺乳氣衝股伏兔䯒外臁足跗諸痛遺溺矢氣奔響腹脹髀不可轉膕似結腨似裂消穀善飢胃寒喘滿勞傷厥逆反胃瘧癘水蠱氣痞寒露九月節運主陽明五氣月令鴻雁來賓雀入水為蛤菊有黃華時配足太陽膀胱寒水行功每日醜寅時正坐舉兩臂踴身上托左右各三五度叩齒吐納咽液治病諸風寒濕邪脅腋經絡動沖頭苦痛目似脫項如拔脊痛腰折痔瘧狂癩痛頭兩邊痛頭囟頂痛目黃淚出鼽衄霍亂諸疾霜降九月中運主陽明五氣月令豺祭獸草木黃落蟄蟲咸俯時配足太陽膀胱寒水行功每日醜寅時平坐紓兩手攀兩足用膝間力縱而復收五七度叩齒吐納咽液治病風濕痹入腰腳髀不可曲膕結痛腨裂痛項背腰尻陰股膝髀痛臍反出肌肉痿下腫便膿血小腹脹痛欲小便不得臟毒筋寒腳氣久痔脫肛立冬十月節運主陽明五氣月令水始冰地始凍雉入水為蜃時配足厥陰肝風木行功每日醜寅時正坐抝頸左右顧兩手左右托各三五度吐納叩齒咽液治病胸脅積滯虛勞邪毒腰痛不可俯仰嗌乾面塵脫色胸滿嘔逆飧泄頭痛耳無聞頰腫肝逆面青目赤腫痛兩脅下痛引小腹四肢滿悶眩冒目腫痛小雪十月中運主太陽終氣月令虹藏不見天升地降閉塞成冬時配足厥陰肝風木行功每日醜寅時正坐一手按膝一手挽肘左右爭力各三五度吐納叩齒咽液治病腕肘風濕熱毒婦人小腹腫丈夫㿉疝狐疝遺溺閉癃血幸腫睪疝足逆寒胻善瘛節時腫轉筋陰縮兩筋攣洞泄血在脅下喘善恐胸中喘五淋大雪十一月節運主太陽終氣月令鵙鳥不鳴虎始交荔挺出時配足少陰腎君火行功每日子丑時起身仰膝兩手左右托兩足左右踏各五七度叩齒吐納咽液治病腳膝風濕毒氣口熱舌乾咽腫上氣嗌乾及腫煩心心痛黃疸腸澼陰下濕飢不欲食面如漆咳唾有血渴喘目無所見心懸如飢多恐常若人捕等病冬至十一月中運主太陽終氣月令蚯蚓結麋角解水泉動時配足少陰腎君火行功每日子丑時平坐伸兩足拳兩手按兩膝左右極力三五度吐納叩齒咽液治病手足經絡寒濕脊股內後臁痛足痿厥嗜臥足下熱痛臍左脅下背肩髀間痛胸中滿大小腹痛大便難腹大頸腫咳嗽腰冷如冰及腫臍下氣逆小腹急痛泄下腫足胻寒而逆凍瘡下痢善思四肢不收小寒十二月節運主太陽終氣月令雁北向鵲始巢雉雊時配足太陰脾濕土行功每日子丑時正坐一手按足一手上托挽手互換極力三五度吐納叩齒漱咽治病榮衛積氣蘊食則嘔胃脘痛腹脹噦瘧飲發中滿食減善噫身體皆重食不下煩心心下急痛溏瘕泄水閉黃疸五泄注下五色大小便不通面黃口乾怠惰嗜臥搶心心下痞苦善飢善味不嗜食大寒十二月中運主厥陰初氣月令雞始乳鷙鳥厲疾水澤腹堅時配足太陰脾濕土行功每日子丑時兩手踞床跪坐一足直伸一足用力左右三五度叩齒漱咽吐納治病經絡濕積諸氣舌本強痛體不能動搖或不能臥強立股膝內腫尻陰臑胻足背痛腹脹腸鳴飧泄不化足不收行九竅不通足胻腫若水附活人心法序昔在太昊之先軒岐未曾有太乙氏之王天下也調泰鴻之氣薄滋味寡嗜欲而修長生久視之道其修養之法已有矣有巢氏搏生咀華以和氣血藥餌之說已有矣陰康氏時水瀆陰凝民疾重墜乃制舞以疏氣血導引之術已有矣故人無夭傷太樸既散民多疾厄厥後軒轅氏作岐伯氏出而有醫藥之方行焉故至人治於未病之先醫家治於已病之後者曰藥餌曰砭焫雖治之法有二而病之源則一未必不由因心而生也老子曰心為神主動靜從心心為禍本心為宗道靜則心君泰然百脈寧謐動則血氣昏亂百病相攻是以性靜則情逸心動則神疲守真則志滿逐物則意移意移則神馳神馳則氣散氣散則病生病生則殞矣雖常俗之語最合於道妙今述其二家之說自成一家新話編為上下二卷目之曰活人心謂常存救人之心欲一人之生同歸於壽域也豈小補哉然世之醫書各家新編者何暇千本紛然聚具徒多無補但此書方雖不多皆能奪命於懸絕雖司命莫之神也凡為醫者而能察其受病之源而用之止此一書醫道足矣人能行其修養之術而用之止此一書仙道成矣何況不壽乎士之於世不缺焉前南極沖虛妙道真君臞仙書
